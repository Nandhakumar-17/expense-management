<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-body">

    <!-- Warning Banner -->
    <div id="warning-banner" class="warning-banner hidden">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <span><strong>Warning!</strong> Your expenses amount is high compared to your income!</span>
        <button id="close-warning" class="close-btn">&times;</button>
    </div>

    <div class="dashboard-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="2" y1="10" x2="22" y2="10"></line>
                </svg>
                <h1>Expense Tracker</h1>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button id="theme-toggle" class="icon-btn" title="Toggle Dark Mode">
                    <svg id="theme-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button id="logout-btn" class="btn btn-outline">Logout</button>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Column: Calendar & Forms -->
            <div class="left-column">
                <!-- Calendar Widget -->
                <section class="card calendar-card">
                    <div class="calendar-header">
                        <button id="prev-month" class="icon-btn">&lt;</button>
                        <h2 id="month-year-display">Month Year</h2>
                        <button id="next-month" class="icon-btn">&gt;</button>
                    </div>
                    <div class="calendar-grid">
                        <div class="day-name">Sun</div>
                        <div class="day-name">Mon</div>
                        <div class="day-name">Tue</div>
                        <div class="day-name">Wed</div>
                        <div class="day-name">Thu</div>
                        <div class="day-name">Fri</div>
                        <div class="day-name">Sat</div>
                    </div>
                    <div id="calendar-days" class="calendar-grid days-grid">
                        <!-- Days will be generated by JS -->
                    </div>
                </section>

                <!-- Add Transaction Form -->
                <section class="card add-transaction-card">
                    <h3>Add Transaction</h3>
                    <p class="subtitle" id="selected-date-display">For: Today</p>
                    <form id="transaction-form">
                        <div class="form-control">
                            <label for="text">Description</label>
                            <input type="text" id="text" placeholder="e.g. Groceries, Salary" required>
                        </div>
                        <div class="form-control">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="" disabled selected>Select a category</option>
                                <optgroup label="Expenses">
                                    <option value="Food">Food & Dining</option>
                                    <option value="Transport">Transportation</option>
                                    <option value="Utilities">Utilities</option>
                                    <option value="Entertainment">Entertainment</option>
                                    <option value="Health">Health & Fitness</option>
                                    <option value="Other Expense">Other Expense</option>
                                </optgroup>
                                <optgroup label="Incomes">
                                    <option value="Salary">Salary</option>
                                    <option value="Freelance">Freelance</option>
                                    <option value="Investment">Investment</option>
                                    <option value="Other Income">Other Income</option>
                                </optgroup>
                            </select>
                        </div>
                        <div class="form-control">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" placeholder="e.g. 50" required min="0.01" step="0.01">
                        </div>
                        <div class="type-toggle">
                            <input type="radio" id="type-expense" name="type" value="expense" checked>
                            <label for="type-expense" class="toggle-btn toggle-expense">Expense</label>
                            
                            <input type="radio" id="type-income" name="type" value="income">
                            <label for="type-income" class="toggle-btn toggle-income">Income</label>
                        </div>
                        <button type="submit" class="btn btn-primary block-btn">Add Transaction</button>
                    </form>
                </section>
            </div>

            <!-- Right Column: Balances, History, Charts -->
            <div class="right-column">
                
                <!-- Balance Display -->
                <section class="balance-section">
                    <div class="balance-card total-balance">
                        <h4>Total Balance</h4>
                        <h2 id="balance">₹0.00</h2>
                    </div>
                    <div class="income-expense-cards">
                        <div class="balance-card inc-card">
                            <h4>Income</h4>
                            <h3 id="money-plus" class="money plus">+₹0.00</h3>
                        </div>
                        <div class="balance-card exp-card">
                            <h4>Expense</h4>
                            <h3 id="money-minus" class="money minus">-₹0.00</h3>
                        </div>
                    </div>
                </section>

                <!-- History -->
                <section class="card history-card">
                    <div class="history-header">
                        <h3>History Details</h3>
                        <div class="view-toggle">
                            <button id="view-daily" class="view-btn active">Daily</button>
                            <button id="view-monthly" class="view-btn">Monthly</button>
                            <button id="export-csv" class="view-btn" title="Export to CSV">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            </button>
                        </div>
                    </div>
                    <ul id="list" class="list">
                        <!-- Transactions will be added here -->
                        <li class="empty-state">No transactions selected.</li>
                    </ul>
                </section>

                <!-- Chart -->
                <section class="card chart-card">
                    <h3>Monthly Usage Overview</h3>
                    <div class="chart-container">
                        <canvas id="expenseChart"></canvas>
                    </div>
                    <h3 style="margin-top: 1.5rem;">Expenses by Category</h3>
                    <div class="chart-container">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </section>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
